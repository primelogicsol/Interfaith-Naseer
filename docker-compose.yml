services:
  db:
    image: postgres:17-alpine
    container_name: interfaith-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-interfaith_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interfaith_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - interfaith-network

  migrate:
    image: ${DOCKERHUB_USERNAME}/interfaith-migrate:latest
    container_name: interfaith-migrate
    working_dir: /app
    entrypoint: sh
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-interfaith_db}?schema=public
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      MODERATOR_EMAIL: ${MODERATOR_EMAIL}
      MODERATOR_PASSWORD: ${MODERATOR_PASSWORD}
      MODERATOR_NAME: ${MODERATOR_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interfaith-network
    command: >
      -c "
        echo '⏳ Waiting for database...' &&
        sleep 3 &&
        echo '📋 Checking if content data exists...' &&
        DATA_EXISTS=$$(PGPASSWORD=\"${POSTGRES_PASSWORD}\" psql -h db -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interfaith_db} -t -c \"SELECT EXISTS (SELECT 1 FROM traditions LIMIT 1);\" 2>/dev/null | tr -d '[:space:]') &&
        if [ \"$$DATA_EXISTS\" != \"t\" ]; then
          echo '📦 Running content seed SQL files...' &&
          for f in /app/data/migrations/*.sql; do
            case \"$$(basename $$f)\" in
              20260405081703_20260405080723_create_faith_assessment_schema.sql)
                echo \"   Skipping $$(basename $$f) — duplicate of 20260405080723\";
                continue;;
            esac;
            echo \"   Running $$(basename $$f)...\";
            PGPASSWORD=\"${POSTGRES_PASSWORD}\" psql -h db -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interfaith_db} -f \"$$f\" 2>&1 || echo \"   ⚠️  Non-fatal errors in $$(basename $$f) — continuing\";
          done &&
          echo '✅ Content data seeded!';
        else
          echo '⏭️  Content data already exists — skipping SQL files';
        fi &&
        echo '📋 Syncing Prisma schema...' &&
        npx prisma db push &&
        echo '✅ Schema synced!' &&
        echo '🌱 Seeding admin accounts...' &&
        npx prisma db seed &&
        echo '✅ All migrations and seeds complete!'
      "
    restart: "no"

  app:
    image: ${DOCKERHUB_USERNAME}/interfaith-app:latest
    container_name: interfaith-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3060}:3060"
    environment:
      NODE_ENV: production
      PORT: 3060
      HOST: 0.0.0.0
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-interfaith_db}?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3060}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3060/api}
      NEXT_PUBLIC_GOOGLE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_VERIFICATION:-}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_GTM_ID: ${NEXT_PUBLIC_GTM_ID:-}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - interfaith-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3060/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  interfaith-network:
    driver: bridge
