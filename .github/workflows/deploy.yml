name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/interfaith-app
  MIGRATE_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/interfaith-migrate

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: ${{ env.APP_IMAGE }}:latest,${{ env.APP_IMAGE }}:${{ github.sha }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: migrate
          push: true
          tags: ${{ env.MIGRATE_IMAGE }}:latest,${{ env.MIGRATE_IMAGE }}:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/interfaith
            echo "${{ env.DOCKERHUB_TOKEN }}" | docker login -u ${{ env.DOCKERHUB_USERNAME }} --password-stdin
            docker pull ${{ env.APP_IMAGE }}:latest
            docker pull ${{ env.MIGRATE_IMAGE }}:latest
            docker-compose down
            docker-compose up -d
            docker image prune -f
            docker logout
